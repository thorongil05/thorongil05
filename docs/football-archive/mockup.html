<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Football Archive Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap");
      body {
        font-family: "Inter", sans-serif;
        background-color: #0f172a;
      }
      .glass-card {
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 10px;
      }
    </style>
  </head>
  <body class="text-slate-200 overflow-hidden h-screen flex">
    <aside
      class="w-20 lg:w-64 border-r border-slate-800 flex flex-col items-center lg:items-start p-4 bg-slate-900/50"
    >
      <div class="flex items-center gap-3 mb-10 px-2">
        <div
          class="bg-blue-500 p-2 rounded-lg text-white shadow-lg shadow-blue-500/20"
        >
          <i class="fas fa-chart-line text-xl"></i>
        </div>
        <span
          class="text-xl font-bold hidden lg:block tracking-tight text-white"
          >MFD <span class="text-blue-400">Archive</span></span
        >
      </div>

      <nav class="space-y-4 w-full">
        <a
          href="#"
          class="flex items-center gap-4 p-3 rounded-xl bg-blue-500/10 text-blue-400 border border-blue-500/20 w-full transition-all"
        >
          <i class="fas fa-futbol w-6"></i>
          <span class="font-semibold hidden lg:block">Archivio Match</span>
        </a>
        <a
          href="#"
          class="flex items-center gap-4 p-3 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white w-full transition-all"
        >
          <i class="fas fa-university w-6"></i>
          <span class="font-medium hidden lg:block">Finanza Club</span>
        </a>
        <a
          href="#"
          class="flex items-center gap-4 p-3 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white w-full transition-all"
        >
          <i class="fas fa-history w-6"></i>
          <span class="font-medium hidden lg:block">Storico Leghe</span>
        </a>
      </nav>

      <div class="mt-auto w-full p-2">
        <div class="bg-slate-800/50 rounded-2xl p-4 hidden lg:block">
          <p class="text-xs text-slate-500">Database Status</p>
          <div class="flex items-center gap-2 mt-1">
            <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
            <span class="text-xs font-semibold">Live Feed OK</span>
          </div>
        </div>
      </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
      <header
        class="h-20 flex items-center justify-between px-8 border-b border-slate-800"
      >
        <div class="relative w-1/3">
          <i
            class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"
          ></i>
        </div>
      </header>
    </main>
  </body>
</html>
